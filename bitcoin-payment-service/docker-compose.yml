services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bitcoin_payments
      POSTGRES_USER: bitcoin
      POSTGRES_PASSWORD: bitcoin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bitcoin -d bitcoin_payments"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/bitcoin_payments
      SPRING_DATASOURCE_USERNAME: bitcoin
      SPRING_DATASOURCE_PASSWORD: bitcoin
    ports:
      - "8080:8080"

volumes:
  pgdata:
