spring:
  application:
    name: bitcoin-payment-service
  datasource:
    url: jdbc:postgresql://localhost:5432/bitcoin_payments
    username: bitcoin
    password: bitcoin
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

bitcoin:
  network: testnet
  xpub: ${BITCOIN_XPUB:}
  required-confirmations: 1
  mempool-base-url: https://mempool.space/testnet/api

pricing:
  coingecko:
    base-url: https://api.coingecko.com/api/v3

polling:
  fixed-delay-ms: 30000

logging:
  level:
    com.yourcompany.bitcoinpayment: INFO
