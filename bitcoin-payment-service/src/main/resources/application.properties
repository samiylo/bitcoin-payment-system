spring.application.name=bitcoin-payment-service
spring.datasource.url=jdbc:h2:mem:bitcoin_payments;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.port=8080

bitcoin.network=testnet
bitcoin.xpub=${BITCOIN_XPUB:}
bitcoin.required-confirmations=1
bitcoin.mempool-base-url=https://mempool.space/testnet/api

pricing.coingecko.base-url=https://api.coingecko.com/api/v3

polling.fixed-delay-ms=30000

logging.level.com.yourcompany.bitcoinpayment=INFO
